name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Default least-privilege at workflow level; jobs escalate only what they need.
permissions:
  contents: read

jobs:
  # ── Backend: lint + type + test ───────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint — ruff check
        run: ruff check backend/

      - name: Lint — ruff format
        run: ruff format --check backend/

      - name: Type check — mypy
        run: mypy backend/app/ --strict

      - name: Test — pytest with coverage
        env:
          DATA_DIR: backend/tests/fixtures
        run: |
          pytest backend/tests/ -v \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-backend
          path: coverage.xml
          retention-days: 7

  # ── Frontend: lint + type + unit tests ───────────────────────────────────
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint — ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type check — tsc --noEmit
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests — Vitest
        working-directory: frontend
        run: npm run test -- --reporter=verbose

      - name: Build — Vite production build
        working-directory: frontend
        run: npm run build
        env:
          VITE_BACKEND_URL: http://127.0.0.1:8000


  # ── Security: pip-audit + npm audit ──────────────────────────────────────
  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    # Run on push to main and on PRs; failures are informational (warn, don't block)
    # for HIGH/CRITICAL — set --fail-on CRITICAL to make it a hard gate.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: pip-audit (backend)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Set up Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"

      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=moderate

  # ── SBOM: CycloneDX for both stacks ──────────────────────────────────────
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Generate SBOM — backend (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements backend/requirements.txt --of json -o sbom-backend.json

      - name: Set up Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"

      - name: Generate SBOM — frontend (CycloneDX)
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: sbom
          path: |
            sbom-backend.json
            sbom-frontend.json
          retention-days: 90

  # ── CodeQL: SAST (Python + JavaScript/TypeScript) ─────────────────────────
  # IMPORTANT: CodeQL SARIF upload to the Security tab requires GitHub Advanced
  # Security (GHAS), which is NOT available on free private repos. The
  # `continue-on-error` and conditional `upload` below make this job safe on
  # both public repos (GHAS free, hard gate) and private repos (GHAS unavailable,
  # scan runs but SARIF is saved as artifact instead of failing the check).
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event.repository.private }}
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: ${{ !github.event.repository.private }}
          output: sarif-results

      - name: Upload SARIF artifact (private repo fallback)
        if: ${{ github.event.repository.private }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results
          retention-days: 30

  # ── Lighthouse CI (frontend performance + a11y budget) ───────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_BACKEND_URL: http://127.0.0.1:8000

      - name: Start backend (background)
        env:
          DATA_DIR: backend/tests/fixtures
        run: |
          uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/backend.pid
          # Wait for backend to be ready
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/teams && break || sleep 2
          done

      - name: Run Lighthouse CI
        working-directory: frontend
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN || '' }}

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/backend.pid) 2>/dev/null || true
