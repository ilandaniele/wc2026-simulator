services:
  - type: web
    name: wc2026-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt && (python retrain.py || echo "[build] retrain skipped - using committed POST.json")
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://wc2026-simulator-435.netlify.app,https://wc2026-simulator.netlify.app
