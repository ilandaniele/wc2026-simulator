<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC2026 · Simulador</title>
    <!-- FOUC guard: apply dark class synchronously before first paint -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('wc2026.theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
